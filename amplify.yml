version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing dependencies..."
        - npm ci
        - echo "Loading secrets from GCP Secret Manager..."
        - node scripts/load-gsm-secrets.js
    build:
      commands:
        - echo "Generating Prisma client..."
        - npx prisma generate
        - echo "Building Next.js app..."
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

